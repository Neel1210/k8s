apiVersion: apps/v1
kind: Deployment
metadata:
  name: ex-ingester
  namespace: sandbox
  labels:
    app: ex-ingester
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ex-ingester
  template:
    metadata:
      labels:
        app: ex-ingester
    spec:
      containers:
        - name: ex-ingester
          image: ex-ingester:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          # 🔽 FIXED: Enforced resource barriers to stop noisy neighbor issues
          resources:
            requests:
              memory: "256Mi"    # Guaranteed starting RAM
              cpu: "250m"        # 0.25 of a CPU core
            limits:
              memory: "512Mi"   # Max RAM ceiling (1GB) before safe isolation
              cpu: "500m"       # Max 1 full CPU core under intense 50K spikes
          env:
            - name: APP_LOGGING_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: sandbox-config
                  key: APP_LOGGING_LEVEL
          envFrom:
            - configMapRef:
                name: sandbox-config
            - secretRef:
                name: sandbox-secret 
---
apiVersion: v1
kind: Service
metadata:
  name: ex-ingester-service
  namespace: sandbox
spec:
  type: ClusterIP
  selector:
    app: ex-ingester
  ports:
    - name: http
      port: 8080
      targetPort: 8080