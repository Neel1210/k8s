apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-service-deployment
  namespace: sandbox
  labels:
    app: worker-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-service
  template:
    metadata:
      labels:
        app: worker-service
    spec:
      # 🔑 FIXED: Removed runtimeClassName: gvisor to allow native namespace/chroot commands
      containers:
        - name: worker-service
          image: executor-worker-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: sandbox-config
            - secretRef:
                name: sandbox-secret             
          env:
            - name: CONTAINERD_ADDRESS
              value: "/run/containerd/containerd.sock"
            - name: CONTAINERD_NAMESPACE
              value: "k8s.io"
            - name: SERVER_TOMCAT_BASED_DIR
              value: "/app/tomcat-tmp"
            - name: JAVA_TOOL_OPTIONS
              value: "-Djava.io.tmpdir=/app/tomcat-tmp"
            - name: MANAGEMENT_HEALTH_REDIS_ENABLED
              value: 'false'
            - name: LANGUAGE_CONFIG_FILE_PATH
              valueFrom:
              configMapKeyRef:
                name: sandbox-config
                key: app.executor.language-config-file-path         
          volumeMounts:
            - name: containerd-data
              mountPath: /var/lib/containerd
            - name: worker-code
              mountPath: /var/lib/worker-code
            - name: containerd-run
              mountPath: /run/containerd
            - name: language-config-volume
              mountPath: /files/executor/language-config.json
              subPath: language-config.json              
            - name: tomcat-scratch
              mountPath: /app/tomcat-tmp
            # 🔑 FIXED: Target the correct directory and enable Bidirectional propagation
            - name: isolate-storage
              mountPath: /var/local/lib/isolate
              mountPropagation: Bidirectional

          securityContext:
            capabilities:
              add: ["SYS_ADMIN"]
            runAsUser: 0
            runAsGroup: 0
            privileged: true
            allowPrivilegeEscalation: true

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5

      volumes:
        - name: language-config-volume
          configMap:
            name: sandbox-config
            key: app.executor.language-config-file-path
            items:
            - key: language-config.json     # Plucks just the JSON file out of the ConfigMap
              path: language-config.json
        - name: tomcat-scratch
          emptyDir: {}
        # 🔑 FIXED: Point the storage directly to the dedicated Isolate host path location
        - name: isolate-storage
          hostPath:
            path: /var/local/lib/isolate
            type: DirectoryOrCreate
        - name: containerd-data
          hostPath:
            path: /var/lib/containerd
            type: DirectoryOrCreate
        - name: containerd-run
          hostPath:
            path: /run/containerd
            type: DirectoryOrCreate
        - name: worker-code
          hostPath:
            path: /var/lib/worker-code
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: worker-service-service
  namespace: sandbox
spec:
  type: ClusterIP
  selector:
    app: worker-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080