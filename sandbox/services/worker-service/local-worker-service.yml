apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-service-deployment
  namespace: sandbox
  labels:
    app: worker-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-service
  template:
    metadata:
      labels:
        app: worker-service
    spec:
      runtimeClassName: gvisor  # Use gVisor for sandbox isolation
      containers:
        - name: worker-service
          image: executor-worker-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            # 💡 Change this to 8080 if your Spring Boot app uses the default 8080 port!
            - containerPort: 8080

          envFrom:
            - configMapRef:
                name: sandbox-config
            - secretRef:
                name: sandbox-secret             
          env:
            - name: CONTAINERD_ADDRESS
              value: "/run/containerd/containerd.sock"
            - name: CONTAINERD_NAMESPACE
              value: "k8s.io"
          volumeMounts:
            - name: containerd-data
              mountPath: /var/lib/containerd
            - name: worker-code
              mountPath: /var/lib/worker-code
            - name: containerd-run
              mountPath: /run/containerd
            # 🔽 FIXED: Mounted the missing declared volumes to pass validation
            - name: config-volume
              mountPath: /opt/language-configs
            - name: isolate-storage
              mountPath: /tmp/isolate

          securityContext:
            capabilities:
              add: ["SYS_ADMIN"]
            runAsUser: 0
            runAsGroup: 0
            privileged: true
            allowPrivilegeEscalation: true

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"

          # 💡 Ensure these ports point to your actual Spring Boot server.port
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5

      volumes:
        - name: config-volume
          configMap:
            name: language-configs
        - name: isolate-storage
          emptyDir: {} 

        - name: containerd-data
          hostPath:
            path: /var/lib/containerd
            type: DirectoryOrCreate
        - name: containerd-run
          hostPath:
            path: /run/containerd
            type: DirectoryOrCreate
        - name: worker-code
          hostPath:
            path: /var/lib/worker-code
            type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: worker-service-service
  namespace: sandbox
spec:
  type: ClusterIP
  selector:
    app: worker-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080  # 💡 Matches your container port perfectly