apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-service-deployment
  namespace: sandbox
  labels:
    app: worker-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-service
  template:
    metadata:
      labels:
        app: worker-service
    spec:
      # DO NOT use gVisor for worker-service
      # It needs full access to containerd socket
      containers:
        - name: worker-service
          image: worker-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_RABBITMQ_HOST
              value: "host.docker.internal" 
            - name: SPRING_RABBITMQ_PORT
              value: "5672"
            - name: SPRING_RABBITMQ_USERNAME
              value: "guest"
            - name: SPRING_RABBITMQ_PASSWORD
              value: "guest"
          volumeMounts:
            # Mount containerd socket for nerdctl
            - name: containerd-run
              mountPath: /run/containerd
            # Mount containerd data for images/snapshots
            - name: containerd-data
              mountPath: /var/lib/containerd
            # Mount worker code directory
            - name: worker-code
              mountPath: /var/lib/worker-code
            # Mount sandbox images directory (for building/importing images)
            - name: sandbox-images
              mountPath: /var/lib/sandbox-images

          securityContext:
            runAsUser: 0
            runAsGroup: 0
            privileged: true
            allowPrivilegeEscalation: true

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"

          livenessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 5

          readinessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 5
            failureThreshold: 5

      volumes:
        # Containerd runtime directory (contains socket)
        - name: containerd-run
          hostPath:
            path: /run/containerd
            type: DirectoryOrCreate
        # Containerd data directory
        - name: containerd-data
          hostPath:
            path: /var/lib/containerd
            type: DirectoryOrCreate
        # Worker code directory
        - name: worker-code
          hostPath:
            path: /var/lib/worker-code
            type: DirectoryOrCreate
        # Sandbox images directory (shared volume for image tars)
        - name: sandbox-images
          hostPath:
            path: /var/lib/sandbox-images
            type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: worker-service-service
  namespace: sandbox
spec:
  type: ClusterIP
  selector:
    app: worker-service
  ports:
    - name: http
      port: 8082
      targetPort: 8082