apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-service-deployment
  namespace: sandbox
  labels:
    app: worker-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-service
  template:
    metadata:
      labels:
        app: worker-service
    spec:
      # Commenting out gVisor for local testing compatibility
      # runtimeClassName: gvisor  
      containers:
        - name: worker-service
          image: worker-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_RABBITMQ_HOST
              value: "host.docker.internal" # or better: host's private IP
            - name: SPRING_RABBITMQ_PORT
              value: "5672"
            - name: SPRING_RABBITMQ_USERNAME
              value: "guest"
            - name: SPRING_RABBITMQ_PASSWORD
              value: "guest"
          
          volumeMounts:
            # Mount the Language Config JSON from ConfigMap
            - name: config-volume
              mountPath: /app/config
            # Mount the Isolate "Box" directory to local ephemeral storage
            - name: isolate-storage
              mountPath: /var/local/lib/isolate

          securityContext:
            # SYS_ADMIN is the minimum required for Isolate to manage namespaces
            privileged: true
            allowPrivilegeEscalation: true
            capabilities:
              add: ["SYS_ADMIN"]

          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 15

      volumes:
        - name: config-volume
          configMap:
            name: language-configs
        
        # Switched to emptyDir for local speed and to avoid hostPath permission issues
        - name: isolate-storage
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: worker-service-service
  namespace: sandbox
spec:
  type: ClusterIP
  selector:
    app: worker-service
  ports:
    - name: http
      port: 8082
      targetPort: 8082