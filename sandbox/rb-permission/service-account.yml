apiVersion: v1
kind: ServiceAccount
metadata:
  name: my-app-sa
  namespace: sandbox
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jobs-manager
  namespace: sandbox
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jobs-manager-binding
  namespace: sandbox
subjects:
  - kind: ServiceAccount
    name: my-app-sa
    namespace: sandbox
roleRef:
  kind: Role
  name: jobs-manager
  apiGroup: rbac.authorization.k8s.io