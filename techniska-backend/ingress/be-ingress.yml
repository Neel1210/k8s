apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: techniska-backend-ingress
  namespace: techniska-backend
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 8080
