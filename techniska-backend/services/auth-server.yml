apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-server-deployment
  namespace: techniska-backend
  labels:
    app: auth-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-server
  template:
    metadata:
      labels:
        app: auth-server
    spec:
      containers:
        - name: auth-server
          image: techniska-auth-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: techniska-config
            - secretRef:
                name: techniska-secret 
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: auth-server-service
  namespace: techniska-backend
spec:
  type: ClusterIP
  selector:
    app: auth-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080