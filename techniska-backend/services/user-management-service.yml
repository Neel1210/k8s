apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-management-deployment
  namespace: techniska-backend
  labels:
    app: user-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-management
  template:
    metadata:
      labels:
        app: user-management
    spec:
      containers:
        - name: user-management
          image: techniska-user-management-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: techniska-config
            - secretRef:
                name: techniska-secret 
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: user-management-service
  namespace: techniska-backend
spec:
  type: ClusterIP
  selector:
    app: user-management
  ports:
    - name: http
      port: 8080
      targetPort: 8080